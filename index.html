<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Download Instagram Reels Without Watermark | ReelSnag</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FXNM54KLMJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FXNM54KLMJ');
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #111118;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #ff3d6b;
      border: none;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>ReelSnag</h2>
  <p>Download Instagram reels without watermark</p>

  <input id="urlInput" type="text" placeholder="Paste reel link here..." />

  <button id="downloadBtn" onclick="handleDownload()">
    Download
  </button>
</div>

<script>
const btn = document.getElementById('downloadBtn');
const input = document.getElementById('urlInput');

input.addEventListener("keypress", e => {
  if (e.key === "Enter") handleDownload();
});

input.addEventListener("paste", () => {
  gtag('event', 'url_paste');
});

function handleDownload() {
  const url = input.value.trim();
  if (!url) return;

  gtag('event', 'download_click');

  btn.disabled = true;
  btn.innerText = "Downloading...";

  // 🔥 FIXED DOWNLOAD METHOD
  const downloadUrl = `/download?url=${encodeURIComponent(url)}&t=${Date.now()}`;

  window.open(downloadUrl, '_blank');

  // assume success
  setTimeout(() => {
    gtag('event', 'download_success');
    btn.disabled = false;
    btn.innerText = "Download";
  }, 2000);
}
</script>

</body>
</html>

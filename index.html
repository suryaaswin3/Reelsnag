<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ReelSnag</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-FXNM54KLMJ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-FXNM54KLMJ');
</script>

<style>
body {
  font-family: Arial;
  background: #0a0a0f;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:#111118;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}
input {
  width:100%;
  padding:10px;
  margin-top:10px;
}
button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>ReelSnag</h2>

<input id="urlInput" placeholder="Paste reel link"/>

<button id="downloadBtn" onclick="handleDownload()">Download</button>

<p id="status"></p>

</div>

<script>
async function handleDownload() {
  const url = urlInput.value.trim();
  if (!url) return;

  gtag('event','download_click');

  downloadBtn.innerText = "Downloading...";
  downloadBtn.disabled = true;

  try {
    const res = await fetch('/download', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });

    if (!res.ok) throw new Error();

    const blob = await res.blob();

    const fileName = "reelsnag_" + Date.now() + ".mp4";
    const objectUrl = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = objectUrl;
    a.download = fileName;

    document.body.appendChild(a);
    a.click();

    setTimeout(()=>{
      URL.revokeObjectURL(objectUrl);
      a.remove();
    },1500);

    status.innerText = "Downloaded!";
    gtag('event','download_success');

  } catch {
    status.innerText = "Error downloading";
    gtag('event','download_failed');
  }

  downloadBtn.innerText = "Download";
  downloadBtn.disabled = false;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReelSnag — Instagram Reel Downloader</title>
  <link rel="icon" type="image/png" href="/static/favicon.png?v=100">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #ff3d6b;
      --accent2: #ff8c42;
      --text: #f0f0f5;
      --muted: #5a5a72;
      --success: #3dffa0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,61,107,0.12), transparent 70%);
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,140,66,0.10), transparent 70%);
      z-index: 0;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(40px,30px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.2rem;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.45rem;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: var(--text);
    }

    .btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.95rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    .status {
      margin-top: 1rem;
      display: none;
    }

    .status.show {
      display: block;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    <div class="logo-icon">⬇</div>
    <span class="logo-text">ReelSnag</span>
  </div>

  <div class="card">
    <h1>Download Instagram Reels</h1>
    <p class="subtitle">Paste any public reel link below and download it as MP4 in seconds.</p>

    <div class="input-wrap">
      <input id="urlInput" type="url" placeholder="https://www.instagram.com/reel/..."/>
    </div>

    <button class="btn" onclick="handleDownload()">Download Reel</button>

    <div class="status" id="status">
      <span id="statusText"></span>
    </div>

  </div>

  <p class="footer">For personal use only · Respect creators' rights</p>

</div>

<script>
async function handleDownload() {
  const url = document.getElementById('urlInput').value.trim();
  const status = document.getElementById('status');
  const text = document.getElementById('statusText');

  if (!url) {
    status.className = "status show";
    text.innerText = "Paste URL first";
    return;
  }

  text.innerText = "Downloading...";
  status.className = "status show";

  try {
    const res = await fetch('/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });

    if (!res.ok) throw new Error();

    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'reel.mp4';
    a.click();

    text.innerText = "Downloaded!";
  } catch {
    text.innerText = "Error downloading";
  }
}
</script>

</body>
</html>

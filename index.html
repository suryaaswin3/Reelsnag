<script>
async function handleDownload() {
  const urlInput = document.getElementById("urlInput");
  const downloadBtn = document.getElementById("downloadBtn");
  const status = document.getElementById("status");
  const statusText = document.getElementById("statusText");
  const progressBar = document.getElementById("progressBar");

  const url = urlInput.value.trim();
  if (!url) return;

  localStorage.setItem("lastReelUrl", url);

  status.classList.add("show");
  statusText.innerText = "Preparing...";
  progressBar.style.width = "30%";

  downloadBtn.innerText = "Downloading...";
  downloadBtn.disabled = true;

  fetch('/track',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      url,
      page: window.location.pathname
    })
  }).catch(()=>{});

  try {
    const res = await fetch('/download',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });

    progressBar.style.width = "70%";

    const siteUrl = res.headers.get('X-Site-URL') || window.location.origin;
    const blob = await res.blob();

    await new Promise(r => setTimeout(r, 1000));

    progressBar.style.width = "100%";

    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objectUrl;
    a.download = "reelsnag_" + Date.now() + ".mp4";

    document.body.appendChild(a);
    a.click();

    setTimeout(() => {
      URL.revokeObjectURL(objectUrl);
      a.remove();
    }, 1500);

    if (navigator.share) {
      navigator.share({ title:"ReelSnag", url:siteUrl }).catch(()=>{});
    }

    downloadBtn.innerText = "Downloaded!";
    statusText.innerText = "Downloaded!";
  } catch {
    downloadBtn.innerText = "Error";
    statusText.innerText = "Error";
  }

  setTimeout(() => {
    downloadBtn.innerText = "Download Now (HD, No Watermark)";
    downloadBtn.disabled = false;
    progressBar.style.width = "0%";
    status.classList.remove("show");
  }, 2000);
}
</script>
